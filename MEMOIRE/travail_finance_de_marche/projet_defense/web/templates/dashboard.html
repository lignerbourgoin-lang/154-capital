<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Defence Analytics — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- =========================================================
     MAIN GRID  (3 cols × 2 rows)
     ========================================================= -->
<div class="grid">

  <!-- TOP LEFT — Quantitative -->
  <div class="panel" id="panel-quant">
    <div class="panel-header">
      <span class="panel-title">Quantitative</span>
      <button class="expand-btn" onclick="openOverlay('quant')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-quant"
            src="/charts/quantitative/montecarlo_lockheed_martin.html"></iframe>
  </div>

  <!-- TOP CENTER — Fundamental -->
  <div class="panel" id="panel-fund">
    <div class="panel-header">
      <span class="panel-title">Fondamental</span>
      <button class="expand-btn" onclick="openOverlay('fund')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-fund"
            src="/charts/fundamental/news_lockheed_martin.html"></iframe>
  </div>

  <!-- TOP RIGHT — Global economic news -->
  <div class="panel" id="panel-global">
    <div class="panel-header">
      <span class="panel-title">News économiques globales</span>
      <button class="expand-btn" onclick="openOverlay('global')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-global"
            src="/charts/fundamental/news_global.html"></iframe>
  </div>

  <!-- BOTTOM LEFT — NAV / Optimisation -->
  <div class="panel" id="panel-nav">
    <div class="panel-header">
      <span class="panel-title">NAV — Optimisation</span>
      <button class="expand-btn" onclick="openOverlay('nav')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-nav"
            src="/charts/quantitative/nav_optimised.html"></iframe>
  </div>

  <!-- BOTTOM CENTER — Technical -->
  <div class="panel" id="panel-tech">
    <div class="panel-header">
      <span class="panel-title">Technique</span>
      <button class="expand-btn" onclick="openOverlay('tech')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-tech"
            src="/charts/technical/ichimoku_lockheed_martin.html"></iframe>
  </div>

  <!-- BOTTOM RIGHT — Company news -->
  <div class="panel" id="panel-news">
    <div class="panel-header">
      <span class="panel-title">News par entreprise</span>
      <button class="expand-btn" onclick="openOverlay('news')">&#x26F6;</button>
    </div>
    <iframe class="panel-iframe" id="iframe-news"
            src="/charts/fundamental/news_lockheed_martin.html"></iframe>
  </div>

</div><!-- /grid -->


<!-- =========================================================
     FULLSCREEN OVERLAY
     ========================================================= -->
<div id="overlay" class="overlay hidden">

  <div class="overlay-inner">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span id="sidebar-title">Sélection</span>
        <button class="close-btn" onclick="closeOverlay()">&#x2715;</button>
      </div>
      <div id="sidebar-body"></div>
    </aside>

    <!-- Chart area -->
    <div class="overlay-charts" id="overlay-charts"></div>

  </div>

</div><!-- /overlay -->


<!-- =========================================================
     DATA  (passed from Flask)
     ========================================================= -->
<script>
const COMPANIES = {{ companies | tojson }};

// Chart path patterns
const CHARTS = {
  tech: {
    label: "Technique",
    types: [
      { id: "ichimoku", label: "Ichimoku" },
      { id: "macd",     label: "MACD"     },
      { id: "rsi",      label: "RSI"      },
      { id: "ma",       label: "Moving Averages" },
    ],
    path: (type, company) => `/charts/technical/${type}_${company.slug}.html`,
    hasCompany: true,
    hasType: true,
  },
  quant: {
    label: "Quantitative",
    types: [
      { id: "montecarlo",         label: "Monte Carlo"         },
      { id: "garch_volatility",   label: "GARCH — Volatilité"  },
      { id: "garch_returns",      label: "GARCH — Rendements"  },
      { id: "garch_price",        label: "GARCH — Prix"        },
      { id: "ols_price",          label: "OLS — Prix (scatter)" },
      { id: "ols_price_ts",       label: "OLS — Prix (série)"  },
      { id: "ols_returns",        label: "OLS — Beta (scatter)"},
      { id: "ols_returns_ts",     label: "OLS — Beta (série)"  },
    ],
    // OLS paths use Y vs X (next company circularly)
    path: (type, company, idx) => {
      if (type.startsWith("ols_")) {
        const nextIdx  = (idx + 1) % COMPANIES.length;
        const slugX    = COMPANIES[nextIdx].slug;
        return `/charts/quantitative/${type}_${company.slug}_vs_${slugX}.html`;
      }
      return `/charts/quantitative/${type}_${company.slug}.html`;
    },
    hasCompany: true,
    hasType: true,
  },
  fund: {
    label: "Fondamental",
    path: (type, company) => `/charts/fundamental/news_${company.slug}.html`,
    hasCompany: true,
    hasType: false,
  },
  news: {
    label: "News par entreprise",
    path: (type, company) => `/charts/fundamental/news_${company.slug}.html`,
    hasCompany: true,
    hasType: false,
  },
  global: {
    label: "News globales",
    path: () => `/charts/fundamental/news_global.html`,
    hasCompany: false,
    hasType: false,
  },
  nav: {
    label: "NAV — Optimisation",
    types: [
      { id: "nav_optimised",    label: "NAV base 100 (portfolios)"  },
      { id: "optim_pie_minvar", label: "Pie — Variance minimale"    },
      { id: "optim_pie_sharpe", label: "Pie — Sharpe maximum"       },
      { id: "optim_frontier",   label: "Frontiere efficiente"        },
      { id: "optim_metrics",    label: "Metriques"                  },
      { id: "nav_base100",      label: "Base 100 (15 ans)"          },
    ],
    path: (type) => `/charts/quantitative/${type}.html`,
    hasCompany: false,
    hasType: true,
  },
};
</script>
<script src="/static/dashboard.js"></script>

</body>
</html>
