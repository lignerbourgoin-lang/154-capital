<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Defence Analytics — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 48px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.25em;
      color: #aaaaff;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.15em;
      margin-top: -36px;
    }

    .buttons {
      display: flex;
      gap: 24px;
    }

    button {
      padding: 14px 40px;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-optimisation {
      background: transparent;
      color: #e0e0e0;
      border-color: #555;
    }

    #btn-optimisation:hover {
      border-color: #adff2f;
      color: #adff2f;
    }

    #btn-launch {
      background: #7b2cff;
      color: #fff;
      border-color: #7b2cff;
    }

    #btn-launch:hover {
      background: #9b4cff;
      border-color: #9b4cff;
    }

    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #aaa;
      font-size: 0.8rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #333;
      border-top-color: #7b2cff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>Defence Analytics</h1>
  <p class="subtitle">Lockheed · Airbus · Dassault · Rheinmetall · Saab</p>

  <div class="buttons" id="buttons">
    <button id="btn-optimisation" onclick="optimise()">Optimisation</button>
    <button id="btn-launch" onclick="launch()">Lancer code</button>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    <span id="loader-msg">Fetching data &amp; running analysis…</span>
  </div>

  <script>
    async function _run(endpoint, loadingMsg) {
      document.getElementById("buttons").style.display = "none";
      document.getElementById("loader").style.display  = "flex";
      document.getElementById("loader-msg").textContent = loadingMsg;

      try {
        const res  = await fetch(endpoint, { method: "POST" });
        const data = await res.json();
        if (data.ok) {
          window.location.href = "/dashboard";
        } else {
          document.getElementById("loader-msg").textContent = "Error: " + data.error;
        }
      } catch (e) {
        document.getElementById("loader-msg").textContent = "Network error.";
      }
    }

    function launch()   { _run("/run-analysis",     "Fetching data & running analysis…"); }
    function optimise() { _run("/run-optimisation",  "Running Markowitz optimisation…");  }
  </script>

</body>
</html>
